<svg viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="circleFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#0f766e" stopOpacity="1" />
      <stop offset="50%" stopColor="#14b8a6" stopOpacity="1" />
      <stop offset="100%" stopColor="#06b6d4" stopOpacity="1" />
    </linearGradient>
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stopColor="#7ee8df" stopOpacity="1" />
      <stop offset="100%" stopColor="#14b8a6" stopOpacity="1" />
    </linearGradient>
  </defs>

  <!-- Outer circle arc - top left -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="url(#circleFill)" strokeWidth="18" strokeDasharray="346 1380" strokeDashoffset="0" opacity="0.9"/>
  
  <!-- Inner circle accent -->
  <circle cx="250" cy="250" r="180" fill="none" stroke="url(#innerGradient)" strokeWidth="12" strokeDasharray="283 1131" strokeDashoffset="0" opacity="0.8"/>

  <!-- Bus icon on left -->
  <g transform="translate(140, 260)">
    <!-- Bus body -->
    <rect x="0" y="30" width="80" height="50" rx="8" fill="#7ee8df" stroke="#14b8a6" strokeWidth="2"/>
    
    <!-- Bus cabin -->
    <rect x="0" y="15" width="30" height="25" rx="4" fill="#7ee8df" stroke="#14b8a6" strokeWidth="2"/>
    
    <!-- Front window -->
    <rect x="5" y="20" width="15" height="12" rx="2" fill="none" stroke="#0f766e" strokeWidth="1.5"/>
    
    <!-- Side windows -->
    <rect x="35" y="35" width="12" height="12" rx="2" fill="none" stroke="#0f766e" strokeWidth="1.5"/>
    <rect x="52" y="35" width="12" height="12" rx="2" fill="none" stroke="#0f766e" strokeWidth="1.5"/>
    <rect x="69" y="35" width="12" height="12" rx="2" fill="none" stroke="#0f766e" strokeWidth="1.5"/>
    
    <!-- Wheels -->
    <circle cx="15" cy="85" r="7" fill="none" stroke="#0f766e" strokeWidth="2.5"/>
    <circle cx="65" cy="85" r="7" fill="none" stroke="#0f766e" strokeWidth="2.5"/>
    <circle cx="15" cy="85" r="3" fill="#0f766e"/>
    <circle cx="65" cy="85" r="3" fill="#0f766e"/>
  </g>

  <!-- Train icon on right -->
  <g transform="translate(270, 255)">
    <!-- Train body -->
    <rect x="0" y="20" width="75" height="45" rx="6" fill="#7ee8df" stroke="#14b8a6" strokeWidth="2"/>
    
    <!-- Train cabin front -->
    <path d="M 0 20 L 0 5 L 20 5 L 20 20 Z" fill="#7ee8df" stroke="#14b8a6" strokeWidth="2"/>
    
    <!-- Cabin window -->
    <rect x="3" y="8" width="12" height="9" rx="2" fill="none" stroke="#0f766e" strokeWidth="1.5"/>
    
    <!-- Train side windows -->
    <rect x="25" y="25" width="10" height="10" rx="2" fill="none" stroke="#0f766e" strokeWidth="1.5"/>
    <rect x="40" y="25" width="10" height="10" rx="2" fill="none" stroke="#0f766e" strokeWidth="1.5"/>
    <rect x="55" y="25" width="12" height="10" rx="2" fill="none" stroke="#0f766e" strokeWidth="1.5"/>
    
    <!-- Train wheels -->
    <circle cx="10" cy="72" r="6" fill="none" stroke="#0f766e" strokeWidth="2"/>
    <circle cx="32" cy="72" r="6" fill="none" stroke="#0f766e" strokeWidth="2"/>
    <circle cx="54" cy="72" r="6" fill="none" stroke="#0f766e" strokeWidth="2"/>
    <circle cx="10" cy="72" r="2.5" fill="#0f766e"/>
    <circle cx="32" cy="72" r="2.5" fill="#0f766e"/>
    <circle cx="54" cy="72" r="2.5" fill="#0f766e"/>
  </g>

  <!-- Rupee symbol on top right -->
  <g transform="translate(380, 140)">
    <text x="0" y="0" fontSize="60" fontWeight="bold" fill="#7ee8df" stroke="#14b8a6" strokeWidth="1">₹</text>
    <text x="35" y="0" fontSize="50" fontWeight="bold" fill="#06b6d4">$</text>
  </g>
</svg>